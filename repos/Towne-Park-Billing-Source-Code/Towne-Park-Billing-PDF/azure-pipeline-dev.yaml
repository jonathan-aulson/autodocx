trigger:
- develop

variables:
  - group: 'azure-environment-variables-key-vault-dev'
  - name: dockerfilePath
    value: '$(Build.SourcesDirectory)/Dockerfile'

stages:
# =================================================================================================
# STAGE 1: BUILD AND PUSH THE IMAGE
# =================================================================================================
- stage: Build
  displayName: 'Build and Push Image'
  jobs:
  - job: BuildJob
    displayName: 'Build Docker Image'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: Bash@3
      name: SetImageTag
      displayName: 'Generate Image Tag'
      inputs:
        targetType: 'inline'
        script: |
          IMAGE_TAG=$(date +'%Y%m%d%H%M%S%6N')
          echo "Generated image tag: $IMAGE_TAG"
          echo "##vso[task.setvariable variable=imageTag;isOutput=true]$IMAGE_TAG"

    - task: Docker@2
      displayName: 'Build and Push Image to ACR'
      inputs:
        containerRegistry: 'Docker SC Billing Dev'
        repository: '$(PDF-IMAGE-REPOSITORY)'
        command: 'buildAndPush'
        dockerfile: '$(dockerfilePath)'
        tags: |
          $(SetImageTag.imageTag)

# =================================================================================================
# STAGE 2: DEPLOY TO DEVELOPMENT
# =================================================================================================
- stage: Deploy_Dev
  displayName: 'Deploy to Development'
  dependsOn: Build
  variables:
    imageTag: $[stageDependencies.Build.BuildJob.outputs['SetImageTag.imageTag']]
  jobs:
  - job: Deploy_to_Development
    displayName: 'Deploy to Container App (Dev)'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: AzureCLI@2
      displayName: 'Update Container App Image'
      inputs:
        azureSubscription: '$(AZURE-SUBSCRIPTION)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -e

          echo "Updating container app image to tag: $(imageTag)..."
          az containerapp update \
            --name "$(PDF-CONTAINER-APP-NAME)" \
            --resource-group "$(RESOURCE-GROUP-NAME)" \
            --image "$(PDF-CONTAINER-REGISTRY-DNS)/$(PDF-IMAGE-REPOSITORY):$(imageTag)" 



          echo "##[command]Successfully deployed image: $(PDF-CONTAINER-REGISTRY)/$(PDF-IMAGE-REPOSITORY):$(imageTag)"
